<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna stem -->
  <rect x="97" y="18" width="6" height="22" rx="3" fill="#263238"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="14" r="7" fill="#FF7043" stroke="#263238" stroke-width="2"/>
  <!-- Head -->
  <circle cx="100" cy="108" r="78" fill="#FF7043"/>
  <!-- Ear circles -->
  <circle cx="22" cy="108" r="11" fill="#FF7043" stroke="#263238" stroke-width="3"/>
  <circle cx="178" cy="108" r="11" fill="#FF7043" stroke="#263238" stroke-width="3"/>
  <!-- Goggle frame -->
  <rect x="34" y="74" width="132" height="52" rx="26" fill="#263238"/>
  <!-- Left eye white -->
  <circle cx="71" cy="100" r="20" fill="white"/>
  <!-- Right eye white -->
  <circle cx="129" cy="100" r="20" fill="white"/>
  <!-- Left pupil -->
  <circle cx="71" cy="100" r="9" fill="#263238"/>
  <!-- Right pupil -->
  <circle cx="129" cy="100" r="9" fill="#263238"/>
  <!-- Left shine -->
  <circle cx="77" cy="94" r="3.5" fill="white"/>
  <!-- Right shine -->
  <circle cx="135" cy="94" r="3.5" fill="white"/>
  <!-- Teal spectacle frames -->
  <circle cx="71" cy="100" r="20" fill="none" stroke="#02DFD8" stroke-width="4"/>
  <circle cx="129" cy="100" r="20" fill="none" stroke="#02DFD8" stroke-width="4"/>
  <line x1="91" y1="100" x2="109" y2="100" stroke="#02DFD8" stroke-width="4"/>
  <line x1="34" y1="100" x2="51" y2="100" stroke="#02DFD8" stroke-width="4"/>
  <line x1="149" y1="100" x2="166" y2="100" stroke="#02DFD8" stroke-width="4"/>
  <!-- Mouth — kept well inside head circle -->
  <rect x="58" y="140" width="84" height="26" rx="6" fill="#263238"/>
  <line x1="79" y1="140" x2="79" y2="166" stroke="#FF7043" stroke-width="2.5"/>
  <line x1="100" y1="140" x2="100" y2="166" stroke="#FF7043" stroke-width="2.5"/>
  <line x1="121" y1="140" x2="121" y2="166" stroke="#FF7043" stroke-width="2.5"/>
  <line x1="58" y1="153" x2="142" y2="153" stroke="#FF7043" stroke-width="2.5"/>
</svg>
